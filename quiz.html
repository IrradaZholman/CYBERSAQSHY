<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кибер-Сақшы | Интерактивті тест</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <nav class="top-navbar d-flex justify-content-between align-items-center">
        <a class="navbar-brand" href="dashboard.html">
            <i class="bi bi-shield-check me-2"></i>КИБЕР-САҚШЫ
        </a>
        <a href="dashboard.html" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left me-1"></i>Артқа
        </a>
    </nav>

    <div class="main-content">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="module-header">
                    <i class="bi bi-patch-question"></i>
                    КИБЕРҚАУІПСІЗДІК ТЕСТІ
                </div>
                <div class="module-content">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <span class="text-muted">Сұрақ 1 / 5</span>
                        <div class="progress flex-grow-1 mx-3" style="height: 8px;">
                            <div class="progress-bar bg-success" style="width: 20%"></div>
                        </div>
                    </div>
                    <div class="card border-0 bg-light">
                        <div class="card-body p-4">
                            <h5 class="card-title mb-4">Құпия сөз қандай болуы керек?</h5>
                            <div class="d-grid gap-2">
                                <button class="btn btn-outline-secondary text-start py-3">
                                    <i class="bi bi-circle me-2"></i>Қысқа және қарапайым (мысалы: 123456)
                                </button>
                                <button class="btn btn-outline-secondary text-start py-3">
                                    <i class="bi bi-circle me-2"></i>Ұзын, әртүрлі таңбалармен (әріптер, сандар, белгілер)
                                </button>
                                <button class="btn btn-outline-secondary text-start py-3">
                                    <i class="bi bi-circle me-2"></i>Тек туыстар атымен
                                </button>
                                <button class="btn btn-outline-secondary text-start py-3">
                                    <i class="bi bi-circle me-2"></i>Барлық сайттарда бірдей
                                </button>
                            </div>
                        </div>
                    </div>
                    <div class="d-flex justify-content-between mt-4">
                        <button class="btn btn-outline-secondary" disabled>
                            <i class="bi bi-arrow-left me-1"></i>Алдыңғы
                        </button>
                        <button class="btn btn-success">
                            Келесі <i class="bi bi-arrow-right ms-1"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
