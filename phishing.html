<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кибер-Сақшы | Фишинг симуляторы</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <nav class="top-navbar d-flex justify-content-between align-items-center">
        <a class="navbar-brand" href="dashboard.html">
            <i class="bi bi-shield-check me-2"></i>КИБЕР-САҚШЫ
        </a>
        <a href="dashboard.html" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left me-1"></i>Артқа
        </a>
    </nav>

    <div class="main-content">
        <div class="row g-4">
            <!-- Phishing Simulator -->
            <div class="col-lg-6">
                <div class="module-header">
                    <i class="bi bi-shield-exclamation"></i>
                    ФИШИНГ СИМУЛЯТОРЫ
                </div>
                <div class="module-content">
                    <div class="user-progress-bar">
                        <div class="avatar-sm">О</div>
                        <div class="flex-grow-1">
                            <div class="d-flex justify-content-between small mb-1">
                                <span class="text-muted">200</span>
                                <span class="fw-semibold">ДЕҢГЕЙ: 7</span>
                            </div>
                            <div class="progress" style="height: 6px;">
                                <div class="progress-bar bg-success" style="width: 85%"></div>
                            </div>
                        </div>
                    </div>
                    <div class="chat-simulator">
                        <div class="chat-header">
                            <i class="bi bi-search text-muted"></i>
                            <i class="bi bi-plus-circle text-muted ms-auto"></i>
                            <div class="chat-avatar">
                                <i class="bi bi-instagram"></i>
                            </div>
                            <div>
                                <strong>Instagram.support</strong>
                                <small class="d-block text-muted">Direct Message</small>
                            </div>
                        </div>
                        <div class="p-3">
                            <div class="chat-message">
                                <div class="sender">Instagram.support</div>
                                <div class="text">
                                    Сәлеметсіз бе! Бұл Instagram.support! СІЗ IPHONE 15 ҰТЫП АЛДЫҢЫЗ! 
                                    ТЕЗ АШЫҢЫЗ! Линк: https://percPnWWZ
                                </div>
                            </div>
                            <div class="chat-header mt-2 p-2 bg-white rounded">
                                <input type="text" class="form-control border-0" placeholder="Хабарлама жазыңыз..." readonly>
                                <i class="bi bi-mic text-muted"></i>
                                <i class="bi bi-image text-muted"></i>
                                <i class="bi bi-emoji-smile text-muted"></i>
                            </div>
                        </div>
                    </div>
                    <div class="action-buttons">
                        <button class="btn btn-trap success">
                            <i class="bi bi-check-lg"></i> БҰЛ ТҰЗАҚ
                        </button>
                        <button class="btn btn-trap danger">
                            <i class="bi bi-x-lg"></i> БҰЛ СЕНІМДІ
                        </button>
                    </div>
                </div>
            </div>

            <!-- Password Checker -->
            <div class="col-lg-6">
                <div class="module-header">
                    <i class="bi bi-key"></i>
                    ПАРОЛЬ ТЕКСЕРГІШ
                </div>
                <div class="module-content">
                    <div class="user-progress-bar">
                        <div class="avatar-sm">О</div>
                        <div class="flex-grow-1">
                            <div class="d-flex justify-content-between small mb-1">
                                <span class="text-muted">200</span>
                                <span class="fw-semibold">ДЕҢГЕЙ: 1</span>
                            </div>
                            <div class="progress" style="height: 6px;">
                                <div class="progress-bar bg-success" style="width: 25%"></div>
                            </div>
                        </div>
                    </div>
                    <div class="password-input-wrapper">
                        <input type="text" class="form-control form-control-lg" id="passwordInput" 
                               value="qwerty12345" placeholder="Құпия сөзді енгізіңіз">
                        <div class="d-flex align-items-center gap-2 mt-2">
                            <i class="bi bi-lock text-muted"></i>
                            <div class="strength-bar flex-grow-1">
                                <div class="strength-fill strength-weak" id="strengthFill"></div>
                            </div>
                        </div>
                        <p class="text-danger fw-semibold small mt-1 mb-0" id="strengthText">ӨТЕ ӘЛСІЗ</p>
                        <div class="breaking-time">
                            <i class="bi bi-stopwatch"></i>
                            <span id="breakingTime">БҰЗЫЛУ УАҚЫТЫ: 2 СЕКУНД</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
