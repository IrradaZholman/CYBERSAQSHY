<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кибер-Сақшы | Статистика</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <a href="dashboard.html" class="sidebar-nav-item play-btn" title="Бастау">
                <i class="bi bi-play-fill"></i>
            </a>
            <a href="dashboard.html" class="sidebar-nav-item" title="Басты бет">
                <i class="bi bi-house"></i>
            </a>
            <a href="#" class="sidebar-nav-item" title="Іздеу">
                <i class="bi bi-search"></i>
            </a>
            <a href="stats.html" class="sidebar-nav-item active" title="Статистика">
                <i class="bi bi-bar-chart"></i>
            </a>
            <a href="#" class="sidebar-nav-item" title="Чат">
                <i class="bi bi-chat-dots"></i>
            </a>
            <a href="settings.html" class="sidebar-nav-item" title="Баптаулар">
                <i class="bi bi-gear"></i>
            </a>
            <a href="#" class="sidebar-nav-item" title="Бетбелгілер">
                <i class="bi bi-bookmark"></i>
            </a>
        </aside>

        <main class="main-content">
            <div class="dashboard-header">
                <div class="greeting-card">
                    <h2>Статистика</h2>
                    <p class="datetime text-muted mb-0">Сіздің прогрессіңіз</p>
                </div>
                <div class="profile-card">
                    <div class="profile-avatar">О</div>
                    <div class="profile-info">
                        <h6>Оқушы</h6>
                        <small>Pro User</small>
                    </div>
                    <a href="index.html" class="btn btn-outline-secondary btn-sm ms-auto" title="Шығу">
                        <i class="bi bi-box-arrow-right"></i>
                    </a>
                </div>
            </div>

            <div class="row g-4">
                <div class="col-md-6 col-lg-3">
                    <div class="card border h-100">
                        <div class="card-body text-center">
                            <div class="display-6 fw-bold text-success">850</div>
                            <p class="text-muted mb-0 small">Ұпайлар</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-6 col-lg-3">
                    <div class="card border h-100">
                        <div class="card-body text-center">
                            <div class="display-6 fw-bold text-primary">7</div>
                            <p class="text-muted mb-0 small">Деңгей</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-6 col-lg-3">
                    <div class="card border h-100">
                        <div class="card-body text-center">
                            <div class="display-6 fw-bold text-warning">12</div>
                            <p class="text-muted mb-0 small">Орындалған тапсырмалар</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-6 col-lg-3">
                    <div class="card border h-100">
                        <div class="card-body text-center">
                            <div class="display-6 fw-bold text-info">92%</div>
                            <p class="text-muted mb-0 small">Дұрыс жауаптар</p>
                        </div>
                    </div>
                </div>
            </div>

            <h5 class="section-title mt-4">Тақырып бойынша прогресс</h5>
            <div class="row g-4">
                <div class="col-md-6">
                    <div class="card border">
                        <div class="card-body">
                            <div class="d-flex justify-content-between mb-2">
                                <span><i class="bi bi-shield-exclamation text-success me-2"></i>Фишинг симуляторы</span>
                                <span class="fw-semibold">46%</span>
                            </div>
                            <div class="progress" style="height: 10px;">
                                <div class="progress-bar bg-success" style="width: 46%"></div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="card border">
                        <div class="card-body">
                            <div class="d-flex justify-content-between mb-2">
                                <span><i class="bi bi-key text-primary me-2"></i>Құпия сөз тексергіш</span>
                                <span class="fw-semibold">40%</span>
                            </div>
                            <div class="progress" style="height: 10px;">
                                <div class="progress-bar bg-primary" style="width: 40%"></div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="card border">
                        <div class="card-body">
                            <div class="d-flex justify-content-between mb-2">
                                <span><i class="bi bi-link-45deg text-success me-2"></i>Сенімді сілтемелер</span>
                                <span class="fw-semibold">40%</span>
                            </div>
                            <div class="progress" style="height: 10px;">
                                <div class="progress-bar bg-success" style="width: 40%"></div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="card border">
                        <div class="card-body">
                            <div class="d-flex justify-content-between mb-2">
                                <span><i class="bi bi-envelope-shield text-primary me-2"></i>Спам және фишинг</span>
                                <span class="fw-semibold">46%</span>
                            </div>
                            <div class="progress" style="height: 10px;">
                                <div class="progress-bar bg-primary" style="width: 46%"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
