{% load static %}
<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кибер-Сақшы | Кіру</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card card shadow-lg border-0">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <a href="{% url 'home' %}" class="d-inline-block text-decoration-none" title="Басты бетке">
                        <div class="logo-icon logo-icon--img mb-3 mx-auto p-0 bg-transparent">
                            <img src="{% static 'img/logo.svg' %}" width="70" height="70" alt="">
                        </div>
                    </a>
                    <h1 class="h3 fw-bold text-dark">КИБЕР-САҚШЫ</h1>
                    <p class="text-muted small">Аккаунтқа кіру</p>
                </div>
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-{{ message.tags }} mb-3 py-2 small" role="alert">{{ message }}</div>
                    {% endfor %}
                {% endif %}
                <form method="post" action="{% url 'login' %}" id="loginForm">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="username" class="form-label text-dark">Пайдаланушы аты</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0"><i class="bi bi-person text-muted"></i></span>
                            <input type="text" name="username" class="form-control border-start-0" id="username" placeholder="Логин енгізіңіз" required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label text-dark">Құпия сөз</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0"><i class="bi bi-lock text-muted"></i></span>
                            <input type="password" name="password" class="form-control border-start-0" id="password" placeholder="Құпия сөзді енгізіңіз" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-success w-100 py-2 fw-semibold">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Кіру
                    </button>
                </form>
                <p class="text-center text-muted small mt-3 mb-0">
                    Аккаунт жоқ па? <a href="{% url 'register' %}" class="fw-semibold">Тіркелу</a>
                </p>
                <p class="text-center small mt-2 mb-0"><a href="{% url 'home' %}" class="text-muted">← Басты бетке</a></p>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
