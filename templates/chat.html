{% load static %}
<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кибер-Сақшы | Чат</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <nav class="top-navbar d-flex justify-content-between align-items-center">
        <a class="navbar-brand" href="{% url 'home' %}"><img src="{% static 'img/logo.svg' %}" width="32" height="32" alt="" class="me-2 align-text-bottom">КИБЕР-САҚШЫ</a>
        <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Артқа</a>
    </nav>
    <div class="main-content">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <h4 class="mb-3"><i class="bi bi-chat-dots me-2"></i>Оқушылар чаты</h4>
                <p class="text-muted small mb-4">Сұрақ қойыңыз, жауап беріңіз — Threads сияқты сұрақ-жауап форматы</p>

                <!-- Жаңа сұрақ қосу формасы -->
                <div class="card border mb-4">
                    <div class="card-body">
                        <h6 class="card-title"><i class="bi bi-plus-circle me-2"></i>Жаңа сұрақ қосу</h6>
                        <input type="text" id="threadTitle" class="form-control mb-2" placeholder="Сұрақ тақырыбы">
                        <textarea id="threadContent" class="form-control mb-2" rows="2" placeholder="Сұрақ мәтіні..."></textarea>
                        <button id="btnCreateThread" class="btn btn-success btn-sm"><i class="bi bi-send me-1"></i>Жіберу</button>
                    </div>
                </div>

                <!-- Тредтар тізімі -->
                <div id="threadsList">
                    <div class="text-center text-muted py-4" id="loadingMsg">
                        <div class="spinner-border spinner-border-sm me-2"></div>Жүктелуде...
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div style="display:none">{% csrf_token %}</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const apiThreads = '{% url "chat_api_threads" %}';
        const apiCreateThread = '{% url "chat_thread_create" %}';
        const apiReplyBase = '{% url "chat_reply" 0 %}'.replace('/0/', '/');
        const csrf = document.querySelector('[name=csrfmiddlewaretoken]')?.value || '{{ csrf_token }}';

        function loadThreads() {
            fetch(apiThreads)
                .then(r => r.json())
                .then(data => {
                    const cont = document.getElementById('threadsList');
                    document.getElementById('loadingMsg')?.remove();
                    if (!data.threads || data.threads.length === 0) {
                        cont.innerHTML = '<p class="text-muted text-center py-4">Әзірге сұрақ жоқ. Бірінші болып сұрақ қойыңыз!</p>';
                        return;
                    }
                    cont.innerHTML = data.threads.map(t => {
                        const repliesHtml = (t.replies || []).map(r =>
                            `<div class="thread-reply"><strong>${escapeHtml(r.author)}</strong>: ${escapeHtml(r.content)} <small class="text-muted">${formatDate(r.created_at)}</small></div>`
                        ).join('');
                        return `
                            <div class="card border mb-3 thread-card" data-id="${t.id}">
                                <div class="card-body">
                                    <div class="d-flex justify-content-between">
                                        <strong>${escapeHtml(t.author)}</strong>
                                        <small class="text-muted">${formatDate(t.created_at)}</small>
                                    </div>
                                    <h6 class="mt-2">${escapeHtml(t.title)}</h6>
                                    <p class="mb-2 text-muted small">${escapeHtml(t.content)}</p>
                                    <div class="replies-container mt-2">
                                        ${repliesHtml}
                                    </div>
                                    <div class="d-flex gap-2 mt-2">
                                        <input type="text" class="form-control form-control-sm reply-input" placeholder="Жауап жазыңыз..." data-thread-id="${t.id}">
                                        <button class="btn btn-outline-success btn-sm btn-reply" data-thread-id="${t.id}"><i class="bi bi-reply"></i></button>
                                    </div>
                                </div>
                            </div>`;
                    }).join('');
                    document.querySelectorAll('.btn-reply').forEach(btn => {
                        btn.addEventListener('click', () => sendReply(btn.dataset.threadId));
                    });
                    document.querySelectorAll('.reply-input').forEach(inp => {
                        inp.addEventListener('keypress', e => { if (e.key === 'Enter') sendReply(inp.dataset.threadId); });
                    });
                })
                .catch(() => {
                    document.getElementById('threadsList').innerHTML = '<p class="text-danger text-center">Жүктелу қатесі</p>';
                });
        }

        function sendReply(threadId) {
            const inp = document.querySelector(`.reply-input[data-thread-id="${threadId}"]`);
            const content = inp?.value?.trim();
            if (!content) return;
            fetch(apiReplyBase + threadId + '/reply/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrf },
                body: JSON.stringify({ content })
            })
            .then(r => r.json())
            .then(() => { inp.value = ''; loadThreads(); })
            .catch(alert);
        }

        document.getElementById('btnCreateThread').addEventListener('click', () => {
            const title = document.getElementById('threadTitle').value.trim();
            const content = document.getElementById('threadContent').value.trim();
            if (!title && !content) { alert('Тақырып немесе мәтінді енгізіңіз'); return; }
            fetch(apiCreateThread, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrf },
                body: JSON.stringify({ title: title || content.slice(0,50), content })
            })
            .then(r => r.json())
            .then(() => {
                document.getElementById('threadTitle').value = '';
                document.getElementById('threadContent').value = '';
                loadThreads();
            })
            .catch(e => alert(e.message || 'Қате'));
        });

        function escapeHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
        function formatDate(s) { try { const d=new Date(s); return d.toLocaleString('kk-KZ'); } catch(e){ return s; } }
        loadThreads();
    </script>
</body>
</html>
