{% load static %}
<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кибер-Сақшы | Құпия сөз тексергіш</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <nav class="top-navbar d-flex justify-content-between align-items-center">
        <a class="navbar-brand" href="{% url 'dashboard' %}"><i class="bi bi-shield-check me-2"></i>КИБЕР-САҚШЫ</a>
        <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Артқа</a>
    </nav>
    <div class="main-content">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="module-header"><i class="bi bi-key"></i> ПАРОЛЬ ТЕКСЕРГІШ</div>
                <div class="module-content">
                    <div class="user-progress-bar mb-4">
                        <div class="avatar-sm">О</div>
                        <div class="flex-grow-1">
                            <div class="d-flex justify-content-between small mb-1">
                                <span class="text-muted">200</span>
                                <span class="fw-semibold">ДЕҢГЕЙ: 1</span>
                            </div>
                            <div class="progress" style="height: 6px;">
                                <div class="progress-bar bg-success" style="width: 25%"></div>
                            </div>
                        </div>
                    </div>
                    <div class="password-input-wrapper">
                        <label class="form-label fw-semibold">Құпия сөзді енгізіңіз</label>
                        <input type="text" class="form-control form-control-lg" id="passwordInput" placeholder="Құпия сөзді тексеру үшін енгізіңіз">
                        <div class="d-flex align-items-center gap-2 mt-3">
                            <i class="bi bi-lock text-muted"></i>
                            <div class="strength-bar flex-grow-1">
                                <div class="strength-fill" id="strengthFill" style="width: 0%"></div>
                            </div>
                        </div>
                        <p class="fw-semibold small mt-2 mb-0" id="strengthText"></p>
                        <div class="breaking-time mt-2">
                            <i class="bi bi-stopwatch"></i>
                            <span id="breakingTime">БҰЗЫЛУ УАҚЫТЫ: —</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div style="display:none">{% csrf_token %}</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const passwordInput = document.getElementById('passwordInput');
        const strengthFill = document.getElementById('strengthFill');
        const strengthText = document.getElementById('strengthText');
        const breakingTime = document.getElementById('breakingTime');
        const checkUrl = '{% url "password_check" %}';
        const csrftoken = document.querySelector('[name=csrfmiddlewaretoken]')?.value || '{{ csrf_token }}';
        function checkPassword() {
            const pwd = passwordInput.value;
            if (!pwd) {
                strengthFill.style.width = '0%';
                strengthText.textContent = '';
                strengthText.className = 'fw-semibold small mt-2 mb-0';
                breakingTime.textContent = 'БҰЗЫЛУ УАҚЫТЫ: —';
                return;
            }
            fetch(checkUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrftoken },
                body: JSON.stringify({ password: pwd })
            })
            .then(r => r.json())
            .then(data => {
                const w = { weak: 20, medium: 40, good: 60, strong: 80, very_strong: 100 }[data.strength] || 0;
                strengthFill.style.width = w + '%';
                strengthFill.className = 'strength-fill strength-' + (data.strength || 'weak');
                strengthText.textContent = data.strength_text;
                strengthText.className = 'fw-semibold small mt-2 mb-0 ' + (data.strength === 'weak' || data.strength === 'medium' ? 'text-danger' : 'text-success');
                breakingTime.textContent = 'БҰЗЫЛУ УАҚЫТЫ: ' + data.breaking_time;
            });
        }
        passwordInput.addEventListener('input', checkPassword);
    </script>
</body>
</html>
