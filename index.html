<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кибер-Сақшы | Кіру</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card card shadow-lg border-0">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <div class="logo-icon mb-3">
                        <i class="bi bi-shield-check"></i>
                    </div>
                    <h1 class="h3 fw-bold text-dark">КИБЕР-САҚШЫ</h1>
                    <p class="text-muted small">Киберқауіпсіздік тақырыбы бойынша интерактивті тапсырмалар</p>
                </div>
                <p class="small text-center text-info">Толық тіркелу және кіру үшін жобаны Django арқылы іске қосыңыз (<code>python manage.py runserver</code>). Төменде — статикалық демо.</p>
                <form id="loginForm">
                    <div class="mb-3">
                        <label for="username" class="form-label text-dark">Пайдаланушы аты</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0"><i class="bi bi-person text-muted"></i></span>
                            <input type="text" class="form-control border-start-0" id="username" placeholder="Логин енгізіңіз" required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label text-dark">Құпия сөз</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0"><i class="bi bi-lock text-muted"></i></span>
                            <input type="password" class="form-control border-start-0" id="password" placeholder="Құпия сөзді енгізіңіз" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-success w-100 py-2 fw-semibold">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Кіру (демо)
                    </button>
                </form>
                <p class="text-center text-muted small mt-3 mb-0">
                    Django арқылы жұмыс: тіркелу <a href="/register/" class="fw-semibold">/register/</a>
                </p>
                <p class="text-center text-muted small mt-2 mb-0">
                    Статикалық демо: <a href="register.html" class="fw-semibold">Тіркелу (демо)</a>
                </p>
                <p class="text-center text-muted small mt-2 mb-0">7-сынып оқушыларына арналған</p>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            window.location.href = 'dashboard.html';
        });
    </script>
</body>
</html>
